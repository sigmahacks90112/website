<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    
    <form action="index.php" method="post" enctype="multipart/form-data">

        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter username"  minlength="3" maxlength="20" required>

        <label for="password"><br>Password:</label>
        <input type="password" id="password" placeholder="Enter password" minlength="5" maxlength="15"><br>

        <label for="email"><br>Email:</label>
        <input type="email" id="email" placeholder="Enter email"><br>

        <label for="phone"><br>Phone:</label>
        <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>

        <label for="bday">BirthDate:</label>
        <input type="date" id="bday"><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="0" max="100"><br>

        <label for="title">Title:</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="title">
        <label for="PhD.">PhD</label>
        <input type="radio" id="PhD." value="PhD." name="title"><br>

        <label for="payment">Payment</label>
        <select id="payment">
            <option value="Visa">visa</option>
            <option value="MasterCard">mastercard</option>
            <option value="GiftCard">giftcard</option>
        </select><br>

        <label for="subscribe">Subscribe?</label>
        <input type="checkbox" id="subscribe"><br>

        <label for="comment">Comment</label>
        <textarea id="comment" rows="3" cols="25"></textarea><br>

        <label for="file">File:</label>
        <input type="file" id="file" accept="image/png, image/jpeg"><br>
        
        <input type="reset"><br>
        <input type="submit">

    </form>

</body>
</html>
